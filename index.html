<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Products</title>

    <!-- Font-awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header class="header">
        <!-- Navbar -->
        <nav class="navbar">
            <!-- Left: Menu Icon -->
            <div class="menu-icon">
                <i class="fa-solid fa-bars"></i>
            </div>

            <!-- Center: Title -->
            <h3 class="nav-title poppins">Influencer Products</h3>

            <!-- Right: Cart -->
            <div class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>

            <!-- Desktop Menu -->
            <ul class="nav-items poppins">
                <li><a href="" class="nav-link">Home</a></li>
                <li><a href="" class="nav-link">Products</a></li>
                <li><a href="" class="nav-link">Sign up</a></li>
                <li><a href="" class="nav-link">Log In</a></li>
                <li><a href="" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="" class="nav-link"><i class="fa-solid fa-cart-shopping"></i></a></li>
            </ul>
        </nav>

        <!--Hero Section -->
        <section class="hero">
            <div class="hero-left">
                <h1 class="hero-title poppins">Start your Journey as Influencer</h1>
                <p class="hero-desc poppins">Discover the best tools and gear to kickstart your journey as a content creator. From cameras to lighting setups, everything you need to create  professional-quality content is right here.</p>
                <button class="btn poppins">Prebook now <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="hero-right">
                <img src="assets/images/main-camera.png" alt="Digital Camera">
            </div>
        </section>
    </header>

    <main>
        <!-- Sponsors Section -->
        <section class="sponsors">
            <div class="sponsor">
                <img src="assets/logos/Alibaba.svg" alt="Alibaba">
                <img src="assets/logos/Amazon.svg" alt="Amazon">
                <img src="assets/logos/Daraz.pk Logo.svg" alt="Daraz">
                <img src="assets/logos/Ebay.svg" alt="Ebay">
                <img src="assets/logos/Rakuten.svg" alt="Rakuten">
                <img src="assets/logos/Walmart.svg" alt="Walmart">
                <img src="assets/logos/Target.svg" alt="Target">
            </div>
        </section>
    </main>

    <footer>

    </footer>
</body>

</html>
